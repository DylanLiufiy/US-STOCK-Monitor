name: 24h美股全行业多因子生存监控

on:
  push:
    branches: [ main ]
  # 🚀 【手动触发升级】：允许你在 GitHub 网页端 Actions 页面随时手动点击按钮运行
  workflow_dispatch:

  schedule:
    # ⏱️ 定时器对齐北京工作时间：周一至周五的 09:00 到 18:00，每小时的第 0 分钟触发
    # 北京时间 09:00-18:00 映射到 GitHub Actions 的 UTC 时间为：01:00 至 10:00
    - cron: '0 1-10 * * 1-5'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 1. 检出量化生存系统代码
      uses: actions/checkout@v4

    - name: 2. 初始化准工业级 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 并行安装 Polars 向量引擎及金融总线依赖
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests polars pandas

    - name: 4. 执行多行业流式清洗并流转 Trade25 账本
      env:
        # 🟢 穿透全局 Secrets
        BARK_URL: ${{ secrets.BARK_URL }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        # 💡 执行你仓库里的核心脚本 monitor.py
        python monitor.py

    - name: 5. 自动同步并持久化本地记账资产 (Git Auto-Commit)
      if: always()
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action Bot"
        git add portfolio_ledger_v5.json || true
        git commit -m "🤖 [自动记账] 实时更新 Trade25 可用免费额度与资产净值" -a || true
        git push origin main || true
