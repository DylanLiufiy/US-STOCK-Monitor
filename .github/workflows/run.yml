name: 24h美股全行业多因子生存监控

on:
  push:
    branches: [ main ]
  schedule:
    # 🟢 第一段：北京时间 20:30 - 23:00 (盘前与开盘前半段，每 20 分钟高频提示)
    - cron: '0,20,40 12-14 * * 1-5'
    
    # 💤 第二段：北京时间 23:00 - 次日凌晨 05:00 (深夜睡觉时间，自动降频为每 1 小时巡逻一次)
    - cron: '0 15-21 * * 1-5'

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # 🔒 授予工作流对持久化账本 JSON 文件的读写写入权限，保障 Trade25 额度不失忆
    permissions:
      contents: write
      
    steps:
    - name: 1. 检出量化生存系统代码
      uses: actions/checkout@v4

    - name: 2. 初始化准工业级 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 💡 【已修复】：彻底移除了引发报错的 cache 选项，直接进行无缝的环境创建

    - name: 3. 并行安装 Polars 向量引擎及金融总线依赖
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests polars pandas

    - name: 4. 执行多行业流式清洗并流转 Trade25 账本
      env:
        # 🟢 安全穿透全局 Secrets
        BARK_URL: ${{ secrets.BARK_URL }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        python survivor_v5_simulated.py

    - name: 5. 自动同步并持久化本地记账资产 (Git Auto-Commit)
      if: always() # 确保即使策略中途网络抖动，账本也必须完整保存归档
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action Bot"
        git add portfolio_ledger_v5.json || true
        git commit -m "🤖 [自动记账] 实时更新 Trade25 可用免费额度与资产净值" -a || true
        git push origin main || true
