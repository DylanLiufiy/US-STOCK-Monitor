name: 24h美股全行业多因子生存监控

on:
  push:
    branches: [ main ]
  schedule:
    # 🟢 第一段：北京时间 08:00 - 21:00 (白天实时信息流，每 20 分钟高频洗刷并即时推送)
    # 对应 UTC: 00:00 - 13:00 期间的 0, 20, 40 分运行
    - cron: '0,20,40 0-12 * * 1-5'
    
    # 💤 第二段：北京时间 21:00 - 23:00 (夜间开盘前段，21点、22点执行精准定点夜间推送)
    # 对应 UTC: 13:00 - 15:00 期间的第 0 分钟运行
    - cron: '0 13,14 * * 1-5'
    
    # 🌙 第三段：北京时间 23:00 - 次日凌晨 05:00 (深夜睡觉托管，自动降低为每小时巡逻一次)
    # 对应 UTC: 15:00 - 21:00 期间的第 0 分钟运行。
    - cron: '0 15-21 * * 1-5'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 1. 检出量化生存系统代码
      uses: actions/checkout@v4

    - name: 2. 初始化准工业级 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 并行安装 Polars 向量引擎及金融总线依赖
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests polars pandas

    - name: 4. 执行多行业流式清洗并流转 Trade25 账本
      env:
        BARK_URL: ${{ secrets.BARK_URL }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        python survivor_v5_simulated.py

    - name: 5. 自动同步并持久化本地记账资产 (Git Auto-Commit)
      if: always()
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action Bot"
        git add portfolio_ledger_v5.json || true
        git commit -m "🤖 [自动记账] 实时更新 Trade25 可用免费额度与资产净值" -a || true
        git push origin main || true
