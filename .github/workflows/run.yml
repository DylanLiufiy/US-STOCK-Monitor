name: 24h美股回调自动监控

on:
  push:
    branches: [ main ]
  schedule:
    # 在北京时间周一至周五的晚上 21点 至 次日凌晨 5点，每小时的第 0 分钟自动运行
    - cron: '0 13-21 * * 1-5'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 检查代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装金融数据依赖库
      run: |
        pip install yfinance requests

    - name: 4. 执行监控并发送Bark独立系统提醒
      env:
        # 🟢 钥匙在这里：确保服务器精准调用你在全局 Secrets 里填写的 BARK_URL
        BARK_URL: ${{ secrets.BARK_URL }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: python monitor.py
