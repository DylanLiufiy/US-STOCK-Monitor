name: US Stock Master Quant Monitor

on:
  schedule:
    # ⏱️ 完美开盘把风对齐（北京时间 = UTC + 8 小时）
    - cron: '30 1 * * 1-5'   # ☀️ 北京时间 早上 09:30
    - cron: '30 6 * * 1-5'   # 🌤️ 北京时间 下午 14:30
    - cron: '30 12 * * 1-5'  # 🌆 北京时间 晚上 20:30 (美股开盘前黄金一小时)
    
    # ✨ 精准平移：美股 21:30 开盘后，在 21:45 精准触发高频扫描！
    # 刚好卡在您的 22:00 睡觉安全时间之前，把开盘一瞬间机构疯狂砸盘/扫货的个股在 22:00 前为您全部推送完毕！
    - cron: '45 13 * * 1-5'  # 🌃 北京时间 晚上 21:45 (开盘一刻钟风向标)
    
    # 💥 深夜与凌晨黑天鹅暗哨保持守卫
    - cron: '0 18 * * 1-5'   # 🌙 北京时间 凌晨 02:00 (普通信号静音，黑天鹅强推)
    - cron: '30 19 * * 1-5'  # 🌅 北京时间 清晨 03:30 (普通信号静音，黑天鹅强推)
  workflow_dispatch:

jobs:
  master-quant-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Dual-Strategy Core
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        python monitor.py
        python long_term_monitor.py
