name: BARK LINK TESTER

on:
  workflow_dispatch: # 允许我们在网页上点击绿色按钮强行触发

jobs:
  bark-test-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Network Tools
      run: pip install requests

    - name: Fire Connection Test
      env:
        # 🔒 把保险箱变量注入进来
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: python test_bark.py
