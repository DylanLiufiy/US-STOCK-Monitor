name: US Stock Master Quant Monitor

on:
  schedule:
    # ⏱️ 对应北京时间每周一至周五的晚上 20:30 和 21:30 各精准跑一次！
    # 在您的睡眠时间之外为您推送全美爆破和黄金坑报告
    - cron: '30 12 * * 1-5'
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # 🌟 开启这个，允许您在网页上随时手动点击测试

jobs:
  master-quant-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Dual-Strategy Core
      env:
        # 🔒 这两行是绝对核心！如果没有它们，Python 就会因为读不到 BARK_KEY 而拒绝发送任何推送
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        echo "================ 1. 执行全美股爆破雷达 ================"
        python monitor.py
        
        echo "================ 2. 执行长线核心资产加码雷达 ================"
        python long_term_monitor.py
