name: US Stock Master Quant Monitor

on:
  push:
    branches:
      - main
  workflow_dispatch: # 保持允许手动触发测试

  # ⏱ 【3:30 尾盘唤醒型 · 黄金时间防御矩阵】
  # 完美避开 22:30 - 03:30 无效睡眠时段，新增 03:30 核心尾盘末日大单穿透节点
  schedule:
    # 1. 🪐 盘前对敲与暗池异动侦测 (北京时间 21:00) 
    - cron: '0 13 * * 1-5'
    
    # 2. ⚔️ 睡前最后一击 (北京时间 晚上 22:15) -> 距离 22:30 睡觉仅 15 分钟
    - cron: '15 14 * * 1-5'
    
    # 3. 🔥 ⚡【3:30 尾盘特快】美股收盘前 30 分钟末日大单决战穿透 (北京时间 凌晨 03:30) ⚡ 🔥
    - cron: '30 19 * * 1-5'
    
    # 4. 🌙 夏令时盘后最终结算复盘 (北京时间 清晨 05:45) -> 醒来总账单
    - cron: '45 21 * * 1-5'
    
    # 5. ❄️ 冬令时盘后最终结算复盘 (北京时间 清晨 06:45) -> 醒来总账单
    - cron: '45 22 * * 1-5'

jobs:
  quant-monitor-flow:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4

      - name: 🐍 初始化 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自动开启 pip 缓存，第二次运行速度提升 300%

      - name: 📦 安装量化与 Google 核心依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else
            pip install yfinance pandas finvizfinance requests lxml jinja2 google-genai
          fi

      - name: ⚔️ 运行 [短线游资席位爆破雷达]
        continue-on-error: true 
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # 核心绑定：注入谷歌 AI 密钥
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} 
        run: |
          echo "================ 开始执行：全美股短线游资异动穿透 ================"
          python monitor.py

      - name: 💎 运行 [长线核心资产价值雷达]
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # 核心绑定：注入谷歌 AI 密钥
        run: |
          echo "================ 开始执行：长线多因子价值股票筛选 ================"
          python long_term_monitor.py

      - name: 💾 持久化归档长线监控报告
        if: always() # 确保即使策略未触发任何股票，也将生成的 md 报告安全归档
        uses: actions/upload-artifact@v4
        with:
          name: stock-monitor-reports
          path: |
            stock_monitor_report.md
          retention-days: 7 # 在 GitHub Actions 面板保留 7 天历史记录供下载查询
