name: US Stock Master Quant Monitor

on:
  schedule:
    # ⏱️ 完美开盘把风对齐（北京时间 = UTC + 8 小时）
    - cron: '30 1 * * 1-5'   # ☀️ 北京时间 早上 09:30（定投盘前诊断）
    - cron: '30 6 * * 1-5'   # 🌤️ 北京时间 下午 14:30（午间趋势复盘）
    - cron: '30 12 * * 1-5'  # 🌆 北京时间 晚上 20:30（美股开盘前黄金一小时）
    
    # ✨ 晚上 21:45（开盘一刻钟风向标），在您 22:00 睡觉前把开盘最疯狂的全美扫货个股全部推送完毕！
    - cron: '45 13 * * 1-5'  # 🌃 北京时间 晚上 21:45 精准高频扫描
    
    # 💥 深夜与凌晨黑天鹅暗哨守卫（普通异动静音拦截，大崩盘或特大暴雷才会无视睡眠锁强推）
    - cron: '0 18 * * 1-5'   # 🌙 北京时间 凌晨 02:00 
    - cron: '30 19 * * 1-5'  # 🌅 北京时间 清晨 03:30 
  workflow_dispatch:

jobs:
  master-quant-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Dual-Strategy Core
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        echo "================ 1. 执行全美股爆破雷达 ================"
        python monitor.py
        echo "================ 2. 执行长线核心资产加码雷达 ================"
        python long_term_monitor.py
